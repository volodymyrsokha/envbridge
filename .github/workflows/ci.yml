name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - name: fuzz round-trip (short)
        run: go test -fuzz=FuzzRoundTrip -fuzztime=30s ./internal/envfile/
